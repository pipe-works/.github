# Reusable Python CI Workflow for pipe-works organization
# Based on pipeworks_name_generation's comprehensive CI setup
#
# Usage in your repo's .github/workflows/ci.yml:
#
# Standard Python project:
# jobs:
#   ci:
#     uses: pipe-works/.github/.github/workflows/reusable-python-ci.yml@main
#     with:
#       python-version: '3.12'
#       coverage-threshold: 50
#       run-security: true
#       run-docs: true
#     secrets: inherit
#
# ML/Model project (requires disk cleanup and test markers):
# jobs:
#   ci:
#     uses: pipe-works/.github/.github/workflows/reusable-python-ci.yml@main
#     with:
#       python-version: '3.12'
#       python-versions: '["3.12", "3.13"]'  # Optional: test multiple versions
#       coverage-threshold: 50
#       requires-models: true
#       pytest-matrix-markers: 'not requires_model and not slow'
#       docs-warning-threshold: 60  # Allow up to 60 warnings (for projects with known Sphinx issues)
#     secrets: inherit
#
# Mixed/content project fast lane (content-only PRs):
# jobs:
#   ci:
#     uses: pipe-works/.github/.github/workflows/reusable-python-ci.yml@main
#     with:
#       run-content-validation: true
#       skip-full-ci-on-content-only-pr: true
#       content-paths: |
#         app/worlds/**
#         docs/**
#       content-validation-command: pytest --override-ini addopts= -q tests/test_content_validation.py
#     secrets: inherit

name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Primary Python version (used for coverage upload)'
        required: false
        type: string
        default: '3.12'
      python-versions:
        description: 'All Python versions to test (JSON array, e.g. ["3.12", "3.13"]). If not specified, uses python-version only.'
        required: false
        type: string
        default: ''
      coverage-threshold:
        description: 'Minimum coverage percentage'
        required: false
        type: number
        default: 50
      run-security:
        description: 'Run security scans (bandit, trivy)'
        required: false
        type: boolean
        default: true
      run-docs:
        description: 'Build and validate documentation'
        required: false
        type: boolean
        default: false
      docs-warning-threshold:
        description: 'Maximum documentation warnings allowed (0 = strict, no warnings allowed)'
        required: false
        type: number
        default: 0
      test-os:
        description: 'Operating systems to test on (JSON array, e.g. ["ubuntu-latest", "macos-latest"])'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      requires-models:
        description: 'Enable ML model testing support (disk cleanup, offline mode, custom markers)'
        required: false
        type: boolean
        default: false
      pytest-markers:
        description: 'Pytest marker expression (e.g. "not requires_model and not slow")'
        required: false
        type: string
        default: ''
      pytest-args:
        description: 'Additional pytest arguments (appended to default args)'
        required: false
        type: string
        default: ''
      run-gitleaks:
        description: 'Run gitleaks secret scanning'
        required: false
        type: boolean
        default: true
      coverage-on-matrix:
        description: 'Run coverage on every matrix test job instead of a single dedicated coverage job'
        required: false
        type: boolean
        default: false
      pytest-matrix-markers:
        description: 'Pytest marker expression for matrix test jobs (falls back to pytest-markers)'
        required: false
        type: string
        default: ''
      pytest-matrix-args:
        description: 'Additional pytest args for matrix test jobs (falls back to pytest-args)'
        required: false
        type: string
        default: ''
      pytest-coverage-markers:
        description: 'Pytest marker expression for dedicated coverage job (falls back to pytest-markers)'
        required: false
        type: string
        default: ''
      pytest-coverage-args:
        description: 'Additional pytest args for dedicated coverage job (falls back to pytest-args)'
        required: false
        type: string
        default: ''
      run-supplemental-tests:
        description: 'Run an additional non-coverage pytest job (for example, slow/model suites)'
        required: false
        type: boolean
        default: false
      pytest-supplemental-markers:
        description: 'Pytest marker expression for supplemental tests'
        required: false
        type: string
        default: ''
      pytest-supplemental-args:
        description: 'Additional pytest args for supplemental tests'
        required: false
        type: string
        default: ''
      run-content-validation:
        description: 'Enable fast content validation job'
        required: false
        type: boolean
        default: false
      skip-full-ci-on-content-only-pr:
        description: 'Skip full CI jobs for pull requests where all changed files match content-paths'
        required: false
        type: boolean
        default: false
      content-paths:
        description: 'Newline-separated glob patterns treated as content-only files'
        required: false
        type: string
        default: ''
      content-validation-command:
        description: 'Command to run for content validation (for example: pytest --override-ini addopts= -q tests/test_content_validation.py)'
        required: false
        type: string
        default: ''
    secrets:
      CODECOV_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Detect whether the change can use content-only fast validation.
  change-classification:
    name: Change Classification
    runs-on: ubuntu-latest
    outputs:
      run_full_ci: ${{ steps.classify.outputs.run_full_ci }}
      run_content_validation: ${{ steps.classify.outputs.run_content_validation }}
      content_only: ${{ steps.classify.outputs.content_only }}
      changed_count: ${{ steps.classify.outputs.changed_count }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Classify changed files
      id: classify
      shell: bash
      env:
        RUN_CONTENT_VALIDATION: ${{ inputs.run-content-validation }}
        SKIP_FULL_CI_ON_CONTENT_ONLY_PR: ${{ inputs.skip-full-ci-on-content-only-pr }}
        CONTENT_PATHS: ${{ inputs.content-paths }}
      run: |
        python - <<'PY'
        import fnmatch
        import json
        import os
        import subprocess
        from pathlib import Path

        event_name = os.environ.get("GITHUB_EVENT_NAME", "")
        event_payload = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
        run_content_validation = os.environ.get("RUN_CONTENT_VALIDATION", "false").lower() == "true"
        skip_full_ci = os.environ.get("SKIP_FULL_CI_ON_CONTENT_ONLY_PR", "false").lower() == "true"
        content_patterns = [
            line.strip()
            for line in os.environ.get("CONTENT_PATHS", "").splitlines()
            if line.strip() and not line.strip().startswith("#")
        ]

        def git_changed_files() -> list[str]:
            if event_name == "pull_request":
                pr = event_payload.get("pull_request", {})
                base_sha = pr.get("base", {}).get("sha")
                head_sha = pr.get("head", {}).get("sha")
                if base_sha and head_sha:
                    cmd = ["git", "diff", "--name-only", f"{base_sha}...{head_sha}"]
                else:
                    cmd = ["git", "diff", "--name-only", "HEAD~1...HEAD"]
            elif event_name == "push":
                before = event_payload.get("before")
                after = event_payload.get("after")
                if before and after and before != ("0" * 40):
                    cmd = ["git", "diff", "--name-only", f"{before}...{after}"]
                else:
                    cmd = ["git", "ls-files"]
            else:
                cmd = ["git", "diff", "--name-only", "HEAD~1...HEAD"]

            try:
                output = subprocess.check_output(cmd, text=True, stderr=subprocess.DEVNULL)
            except subprocess.CalledProcessError:
                return []
            return [line.strip() for line in output.splitlines() if line.strip()]

        changed_files = git_changed_files()

        def is_content_file(path: str) -> bool:
            return any(fnmatch.fnmatch(path, pattern) for pattern in content_patterns)

        content_changed = bool(
            changed_files and content_patterns and any(is_content_file(path) for path in changed_files)
        )
        content_only = bool(
            changed_files and content_patterns and all(is_content_file(path) for path in changed_files)
        )

        run_full_ci = True
        if run_content_validation and skip_full_ci and event_name == "pull_request" and content_only:
            run_full_ci = False

        run_content_job = bool(
            run_content_validation
            and event_name == "pull_request"
            and content_changed
            and bool(content_patterns)
        )

        # Safety fallback: never skip full CI unless content validation is actually runnable.
        if not run_full_ci and not run_content_job:
            run_full_ci = True

        output_path = Path(os.environ["GITHUB_OUTPUT"])
        with output_path.open("a", encoding="utf-8") as fh:
            fh.write(f"run_full_ci={'true' if run_full_ci else 'false'}\n")
            fh.write(f"run_content_validation={'true' if run_content_job else 'false'}\n")
            fh.write(f"content_only={'true' if content_only else 'false'}\n")
            fh.write(f"changed_count={len(changed_files)}\n")

        print("Changed files:", len(changed_files))
        for path in changed_files:
            print(f" - {path}")
        print(f"run_full_ci={run_full_ci}")
        print(f"run_content_validation={run_content_job}")
        PY

  # Fast validation path for content/policy changes.
  content-validation:
    name: Content Validation
    needs: [change-classification]
    if: ${{ inputs.run-content-validation && inputs.content-validation-command != '' && needs.change-classification.outputs.run_content_validation == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run content validation
      shell: bash
      run: |
        set -euo pipefail
        ${{ inputs.content-validation-command }}

  # Code quality checks (linting, formatting, type checking)
  code-quality:
    name: Code Quality
    needs: [change-classification]
    if: ${{ needs.change-classification.outputs.run_full_ci == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Ruff linting
      run: |
        ruff check .

    - name: Check code formatting with Black
      run: |
        black --check --diff .

    - name: Run mypy type checking
      run: |
        mypy src/ || true
      continue-on-error: true

  # Matrix test suite (fast signal across configured Python versions / OSes)
  test-matrix:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: [change-classification]
    if: ${{ needs.change-classification.outputs.run_full_ci == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.test-os) }}
        python-version: ${{ inputs.python-versions != '' && fromJSON(inputs.python-versions) || fromJSON(format('["{0}"]', inputs.python-version)) }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Free up disk space (ML models)
      if: ${{ inputs.requires-models == true }}
      run: |
        # Remove unnecessary software to free up ~10GB for ML model testing
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        # Use --no-cache-dir for ML projects to save disk space
        if [ "${{ inputs.requires-models }}" == "true" ]; then
          pip install --no-cache-dir -e ".[dev]"
        else
          pip install -e ".[dev]"
        fi

    - name: Run tests with pytest
      shell: bash
      run: |
        # Matrix-specific markers/args fall back to global pytest-markers/pytest-args
        MARKERS="${{ inputs.pytest-matrix-markers }}"
        if [ -z "$MARKERS" ]; then
          MARKERS="${{ inputs.pytest-markers }}"
        fi

        EXTRA_ARGS="${{ inputs.pytest-matrix-args }}"
        if [ -z "$EXTRA_ARGS" ]; then
          EXTRA_ARGS="${{ inputs.pytest-args }}"
        fi

        # Build pytest command
        PYTEST_CMD="pytest -v"

        if [ -n "$MARKERS" ]; then
          PYTEST_CMD="$PYTEST_CMD -m '$MARKERS'"
        fi

        if [ -n "$EXTRA_ARGS" ]; then
          PYTEST_CMD="$PYTEST_CMD $EXTRA_ARGS"
        fi

        # Coverage is usually collected once in a dedicated job for speed.
        # Optionally allow full coverage on every matrix job for stricter parity.
        if [ "${{ inputs.coverage-on-matrix }}" == "true" ]; then
          PYTEST_CMD="$PYTEST_CMD --cov --cov-report=xml --cov-report=term --cov-fail-under=${{ inputs.coverage-threshold }}"
        else
          PYTEST_CMD="$PYTEST_CMD --no-cov"
        fi

        eval "$PYTEST_CMD"
      env:
        # Prevent accidental model downloads in ML projects
        PIPEWORKS_MODELS_DIR: ${{ inputs.requires-models == true && '/tmp/models' || '/dev/null' }}
        HF_HUB_OFFLINE: ${{ inputs.requires-models == true && '1' || '0' }}

    - name: Install Codecov CLI (matrix mode)
      if: inputs.coverage-on-matrix == true && matrix.os == 'ubuntu-latest' && matrix.python-version == inputs.python-version
      run: |
        python -m pip install --upgrade codecov-cli

    - name: Upload coverage to Codecov (matrix mode)
      if: inputs.coverage-on-matrix == true && matrix.os == 'ubuntu-latest' && matrix.python-version == inputs.python-version
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      run: |
        codecovcli upload-process \
          --disable-search \
          --file ./coverage.xml \
          --flag unittests \
          --name codecov-umbrella \
          || true

  # Dedicated full-coverage run on the primary interpreter.
  # This keeps CI comprehensive while avoiding repeated expensive coverage
  # instrumentation on every matrix leg.
  test-coverage:
    name: Coverage (Python ${{ inputs.python-version }})
    needs: [change-classification]
    if: ${{ inputs.coverage-on-matrix == false && needs.change-classification.outputs.run_full_ci == 'true' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Free up disk space (ML models)
      if: ${{ inputs.requires-models == true }}
      run: |
        # Remove unnecessary software to free up ~10GB for ML model testing
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        # Use --no-cache-dir for ML projects to save disk space
        if [ "${{ inputs.requires-models }}" == "true" ]; then
          pip install --no-cache-dir -e ".[dev]"
        else
          pip install -e ".[dev]"
        fi

    - name: Run coverage suite with pytest
      shell: bash
      run: |
        MARKERS="${{ inputs.pytest-coverage-markers }}"
        if [ -z "$MARKERS" ]; then
          MARKERS="${{ inputs.pytest-markers }}"
        fi

        EXTRA_ARGS="${{ inputs.pytest-coverage-args }}"
        if [ -z "$EXTRA_ARGS" ]; then
          EXTRA_ARGS="${{ inputs.pytest-args }}"
        fi

        PYTEST_CMD="pytest -v --cov --cov-report=xml --cov-report=term --cov-fail-under=${{ inputs.coverage-threshold }}"

        if [ -n "$MARKERS" ]; then
          PYTEST_CMD="$PYTEST_CMD -m '$MARKERS'"
        fi

        if [ -n "$EXTRA_ARGS" ]; then
          PYTEST_CMD="$PYTEST_CMD $EXTRA_ARGS"
        fi

        eval "$PYTEST_CMD"
      env:
        # Prevent accidental model downloads in ML projects
        PIPEWORKS_MODELS_DIR: ${{ inputs.requires-models == true && '/tmp/models' || '/dev/null' }}
        HF_HUB_OFFLINE: ${{ inputs.requires-models == true && '1' || '0' }}

    - name: Install Codecov CLI
      run: |
        python -m pip install --upgrade codecov-cli

    - name: Upload coverage to Codecov
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      run: |
        codecovcli upload-process \
          --disable-search \
          --file ./coverage.xml \
          --flag unittests \
          --name codecov-coverage-job \
          || true

  # Optional supplemental test lane for suites intentionally excluded from
  # matrix and/or coverage marker profiles (for example slow/model tests).
  supplemental-tests:
    name: Supplemental Tests (Python ${{ inputs.python-version }})
    needs: [change-classification]
    if: ${{ needs.change-classification.outputs.run_full_ci == 'true' && inputs.run-supplemental-tests == true && inputs.pytest-supplemental-markers != '' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Free up disk space (ML models)
      if: ${{ inputs.requires-models == true }}
      run: |
        # Remove unnecessary software to free up ~10GB for ML model testing
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ inputs.requires-models }}" == "true" ]; then
          pip install --no-cache-dir -e ".[dev]"
        else
          pip install -e ".[dev]"
        fi

    - name: Run supplemental tests with pytest
      shell: bash
      run: |
        MARKERS="${{ inputs.pytest-supplemental-markers }}"
        EXTRA_ARGS="${{ inputs.pytest-supplemental-args }}"

        PYTEST_CMD="pytest -v --no-cov -m '$MARKERS'"

        if [ -n "$EXTRA_ARGS" ]; then
          PYTEST_CMD="$PYTEST_CMD $EXTRA_ARGS"
        fi

        eval "$PYTEST_CMD"
      env:
        # Prevent accidental model downloads in ML projects
        PIPEWORKS_MODELS_DIR: ${{ inputs.requires-models == true && '/tmp/models' || '/dev/null' }}
        HF_HUB_OFFLINE: ${{ inputs.requires-models == true && '1' || '0' }}

  # Secret scanning
  gitleaks:
    name: Secret Scan (Gitleaks)
    needs: [change-classification]
    if: ${{ inputs.run-gitleaks }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Run gitleaks
      run: |
        docker run --rm \
          -v "$PWD:/repo" \
          zricethezav/gitleaks:v8.24.2 \
          detect --source="/repo" --redact --exit-code=1

  # Security scanning
  security:
    name: Security Scan
    needs: [change-classification]
    if: ${{ inputs.run-security && needs.change-classification.outputs.run_full_ci == 'true' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml]

    - name: Run Bandit security scan
      run: |
        bandit -r . -c pyproject.toml || true
      continue-on-error: true

    - name: Run Trivy vulnerability scanner
      run: |
        docker run --rm \
          -v "$PWD:/workspace" \
          -w /workspace \
          aquasec/trivy:0.63.0 \
          fs \
          --format sarif \
          --output trivy-results.sarif \
          .
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  # Documentation build (if enabled)
  docs:
    name: Documentation Build
    needs: [change-classification]
    if: ${{ inputs.run-docs && needs.change-classification.outputs.run_full_ci == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[docs]"

    - name: Build documentation
      run: |
        cd docs
        make html

    - name: Check for documentation warnings
      if: ${{ inputs.docs-warning-threshold > 0 }}
      run: |
        cd docs
        make html 2>&1 | tee build.log
        # Count warnings
        warning_count=$(grep -c "WARNING:" build.log || true)
        echo "Documentation built with $warning_count warnings"
        # Fail if more than threshold
        if [ "$warning_count" -gt ${{ inputs.docs-warning-threshold }} ]; then
          echo "Too many documentation warnings: $warning_count (threshold: ${{ inputs.docs-warning-threshold }})"
          exit 1
        fi

  # Package build validation
  build:
    name: Build Package
    needs: [change-classification]
    if: ${{ needs.change-classification.outputs.run_full_ci == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package with twine
      run: |
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-packages-${{ matrix.os || 'ubuntu-latest' }}-py${{ matrix.python-version || inputs.python-version }}
        path: dist/
        retention-days: 7

  # All checks passed (for branch protection)
  all-checks-passed:
    name: All Checks Passed
    needs: [change-classification, content-validation, code-quality, test-matrix, test-coverage, supplemental-tests, gitleaks, security, docs, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check all job statuses
      run: |
        RUN_FULL_CI="${{ needs.change-classification.outputs.run_full_ci }}"
        RUN_CONTENT_VALIDATION="${{ needs.change-classification.outputs.run_content_validation }}"

        echo "run_full_ci: $RUN_FULL_CI"
        echo "run_content_validation: $RUN_CONTENT_VALIDATION"

        if [ "$RUN_CONTENT_VALIDATION" == "true" ] && [ "${{ needs.content-validation.result }}" != "success" ]; then
          echo "Content validation failed"
          exit 1
        fi

        # Check if all required jobs succeeded
        if [ "$RUN_FULL_CI" == "true" ]; then
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "Code quality checks failed"
            exit 1
          fi

          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "Matrix tests failed"
            exit 1
          fi

          if [ "${{ inputs.coverage-on-matrix }}" == "false" ] && [ "${{ needs.test-coverage.result }}" != "success" ]; then
            echo "Coverage job failed"
            exit 1
          fi

          if [ "${{ inputs.run-supplemental-tests }}" == "true" ] && [ "${{ needs.supplemental-tests.result }}" != "success" ]; then
            echo "Supplemental tests failed"
            exit 1
          fi
        fi

        if [ "${{ inputs.run-gitleaks }}" == "true" ] && [ "${{ needs.gitleaks.result }}" != "success" ]; then
          echo "Gitleaks scan failed"
          exit 1
        fi

        if [ "$RUN_FULL_CI" == "true" ] && [ "${{ needs.build.result }}" != "success" ]; then
          echo "Package build failed"
          exit 1
        fi

        # Security and docs are optional - only check if they ran
        if [ "$RUN_FULL_CI" == "true" ] && [ "${{ inputs.run-security }}" == "true" ] && [ "${{ needs.security.result }}" != "success" ]; then
          echo "Security scan failed"
          exit 1
        fi

        if [ "$RUN_FULL_CI" == "true" ] && [ "${{ inputs.run-docs }}" == "true" ] && [ "${{ needs.docs.result }}" != "success" ]; then
          echo "Documentation build failed"
          exit 1
        fi

        echo "✅ All checks passed successfully!"
